<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Items - Lost & Found @ TIP Manila</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/profile-styles.css">
  <style>
    .items-table-container {
      max-width: 1200px;
      margin: 0 auto;
      margin-top: 2rem;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .items-table thead {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--black);
    }

    .items-table th {
      padding: 1.5rem;
      text-align: left;
      font-weight: 600;
    }

    .items-table td {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .items-table tbody tr:hover {
      background: var(--light-gray);
    }

    .status-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-badge.lost {
      background: #fff5f5;
      color: #e53e3e;
    }

    .status-badge.found {
      background: #f0fff4;
      color: #38a169;
    }

    .status-badge.claimed {
      background: #ebf8ff;
      color: #3182ce;
    }

    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .edit-item-btn {
      background: var(--primary);
      color: var(--black);
    }

    .delete-item-btn {
      background: var(--danger);
      color: var(--white);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--white);
      border-radius: var(--radius-lg);
      margin: 2rem auto;
    }

    .empty-state i {
      font-size: 4rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <!-- Navigation Header -->
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-left">
        <img src="tip_logo.png" alt="TIP Logo" class="navbar-logo">
        <h1 class="navbar-title">Lost & Found @ TIP Manila</h1>
      </div>
      <nav class="navbar-menu">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <a href="my-items.html" class="nav-link active"><i class="fas fa-box"></i> My Items</a>
        <a href="notifications.html" class="nav-link"><i class="fas fa-bell"></i> Notifications</a>
        <a href="user-profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a>
        <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
      </nav>
      <button class="logout-btn" onclick="handleLogout();">Logout</button>
    </div>
  </header>

  <main style="max-width: 1400px; margin: 0 auto; padding: 2rem;">
    <h1 style="margin-bottom: 2rem; color: var(--black);"><i class="fas fa-box"></i> My Posted Items</h1>

   <div class="items-table-container">
      <table class="items-table" id="itemsTable">
        <thead>
          <tr>
            <th>Item Name</th>
            <th>Category</th>
            <th>Status</th>
            <th>Date Posted</th>
            <th>Days Left</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="itemsBody">
          <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <i class="fas fa-inbox"></i>
      <h2>No Items Yet</h2>
      <p>You haven't posted any items. Go to the home page to post your first item!</p>
      <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">
        <i class="fas fa-plus"></i> Post Item
      </a>
    </div>
  </main>

  <script type="module">
    import { api } from './js/api.js';
    window.api = api;

    async function loadMyItems() {
      try {
        if (!api.isAuthenticated()) {
          window.location.href = '/index.html';
          return;
        }

        const response = await api.getUserItems(1, 100);
        const items = response.items || [];

        if (items.length === 0) {
          document.getElementById('itemsTable').style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
          return;
        }

        const tbody = document.getElementById('itemsBody');
        tbody.innerHTML = '';

        items.forEach(item => {
          const createdDate = new Date(item.createdAt);
          const expiresDate = new Date(item.expiresAt);
          const now = new Date();
          const daysLeft = Math.ceil((expiresDate - now) / (1000 * 60 * 60 * 24));

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.itemName}</td>
            <td>${item.category}</td>
            <td><span class="status-badge ${item.status}">${item.status.toUpperCase()}</span></td>
            <td>${createdDate.toLocaleDateString()}</td>
            <td>${daysLeft > 0 ? daysLeft + ' days' : 'Expired'}</td>
            <td>
              <div class="action-buttons">
                <button class="action-btn edit-item-btn" onclick="alert('Edit feature coming soon!')">Edit</button>
                <button class="action-btn delete-item-btn" onclick="deleteItem('${item._id}')">Delete</button>
              </div>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.error('Error loading items:', error);
        document.getElementById('itemsBody').innerHTML = `<tr><td colspan="6" style="text-align: center; color: red;">Error loading items</td></tr>`;
      }
    }

    async function deleteItem(itemId) {
      if (confirm('Are you sure you want to delete this item?')) {
        try {
          await api.deleteItem(itemId);
          alert('Item deleted successfully');
          loadMyItems();
        } catch (error) {
          alert('Error deleting item: ' + error.message);
        }
      }
    }

    function handleLogout() {
      api.clearToken();
      window.location.href = '/index.html';
    }

    window.deleteItem = deleteItem;
    window.handleLogout = handleLogout;

    window.addEventListener('DOMContentLoaded', loadMyItems);
  </script>
</body>
</html>
