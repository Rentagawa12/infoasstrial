<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Lost & Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/profile-styles.css">
  <style>
    .settings-container { max-width: 600px; margin: 2rem auto; }
    .setting-group { background: var(--white); padding: 2rem; margin-bottom: 1.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
    .setting-group h3 { margin-bottom: 1rem; font-size: 1.2rem; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-container">
      <img src="tip_logo.png" alt="TIP Logo" class="navbar-logo">
      <h1 class="navbar-title">Settings</h1>
      <button class="logout-btn" onclick="api.clearToken(); location.href='/index.html';">Logout</button>
    </div>
  </header>

  <main class="settings-container">
    <div class="setting-group">
      <h3><i class="fas fa-bell"></i> Notifications</h3>
      <label class="toggle-switch">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
      </label>
      <p>Enable push notifications</p>
    </div>

    <div class="setting-group">
      <h3><i class="fas fa-moon"></i> Dark Mode</h3>
      <label class="toggle-switch">
        <input type="checkbox">
        <span class="toggle-slider"></span>
      </label>
      <p>Coming soon!</p>
    </div>

    <div class="setting-group">
      <h3><i class="fas fa-cog"></i> Other Settings</h3>
      <p>Additional settings will be available soon.</p>
    </div>
  </main>

  <script type="module">
    import { api } from './js/api.js';
    window.api = api;
    if (!api.isAuthenticated()) location.href = '/index.html';
  </script>
</body>
</html>
