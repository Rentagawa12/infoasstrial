services:
  - type: web
    name: lost-and-found-app
    env: docker
    repo: https://github.com/Rentagawa12/infoasstrial
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
    disk:
      name: uploads
      mountPath: /app/BACKEND/uploads
      sizeGB: 1
